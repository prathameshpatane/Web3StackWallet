name: Refresh Coin Prices

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 5 minutes
  workflow_dispatch:  # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh prices
        run: |
          curl -X POST \
            https://https://web3-stack-wallet-4ug3.vercel.app/api/coins/refresh-prices/ \
            -H "Authorization: Bearer ${{ secrets.REFRESH_PRICES_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail --retry 3 --retry-delay 5